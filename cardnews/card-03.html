<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F8F8F4; --tint: #EFF1E8; --primary: #4B5E2A; --dark-bg: #2B371A;
  --text: #1A1A18; --sub: #5A5A54; --light: #FFFFFF;
  --border: #DDE0D0; --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}
body { width: 1080px; height: 1350px; overflow: hidden; background: var(--bg); }
.card { width: 1080px; height: 1350px; padding: 96px 88px; display: flex; flex-direction: column; position: relative; }
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #7FAF3A, #4B5E2A); }

.eyebrow {
  font: 600 22px/1 var(--font);
  letter-spacing: 2px;
  color: var(--primary);
  margin-bottom: 28px;
  margin-top: 0;
}

h2 {
  font: 800 68px/1.15 var(--font);
  color: var(--text);
  letter-spacing: -1px;
  margin-bottom: 16px;
}

.subtitle {
  font: 400 28px/1.6 var(--font);
  color: var(--sub);
  margin-bottom: 60px;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  padding: 32px 36px;
  background: var(--light);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 20px;
}

.item-icon {
  width: 56px; height: 56px;
  background: var(--tint);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}

.item-body {}
.item-title {
  font: 700 28px/1.3 var(--font);
  color: var(--text);
  margin-bottom: 8px;
}
.item-desc {
  font: 400 24px/1.5 var(--font);
  color: var(--sub);
}

.handle { position: absolute; bottom: 52px; left: 88px; font: 400 22px/1 var(--font); letter-spacing: 0.5px; color: var(--border); }
.page-num { position: absolute; bottom: 52px; right: 88px; font: 500 22px/1 var(--font); letter-spacing: 3px; color: var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>

  <p class="eyebrow">MATERIAL SHARING</p>
  <h2>이런 걸 나눴어요</h2>
  <p class="subtitle">스터디 참여하신 선생님들께 드린 것들</p>

  <div class="item">
    <div class="item-icon">📋</div>
    <div class="item-body">
      <p class="item-title">발화분석 과제지 + 정답지</p>
      <p class="item-desc">실제 말더듬 발화 예시를 직접 전사·분석해볼 수 있는 과제</p>
    </div>
  </div>

  <div class="item">
    <div class="item-icon">📊</div>
    <div class="item-body">
      <p class="item-title">P-FA Ⅱ 점수 자동계산기</p>
      <p class="item-desc">구글 스프레드시트로 제작 — 연령별 탭 구분, 노란 칸만 채우면 자동 산출</p>
    </div>
  </div>

  <div class="item">
    <div class="item-icon">🤖</div>
    <div class="item-body">
      <p class="item-title">AI 평가보고서 GPTs + 프롬프트</p>
      <p class="item-desc">계산기 결과를 넣으면 보고서 초안이 나오는 워크플로우</p>
    </div>
  </div>

  <div class="item">
    <div class="item-icon">📝</div>
    <div class="item-body">
      <p class="item-title">기출 변형 문항 풀이집</p>
      <p class="item-desc">1급 시험 유형 맞춤 — ND/AD 분류 + 점수 계산 문제</p>
    </div>
  </div>

  <span class="handle">@slp_irudassam</span>
  <span class="page-num">03 / 07</span>
</div>
</body>
</html>
