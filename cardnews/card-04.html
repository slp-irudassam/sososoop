<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F8F8F4; --tint: #EFF1E8; --primary: #4B5E2A; --dark-bg: #2B371A;
  --text: #1A1A18; --sub: #5A5A54; --light: #FFFFFF;
  --border: #DDE0D0; --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}
body { width: 1080px; height: 1350px; overflow: hidden; background: var(--dark-bg); }
.card { width: 1080px; height: 1350px; padding: 96px 88px; display: flex; flex-direction: column; justify-content: center; position: relative; }

.accent-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #7FAF3A, #4B5E2A); }

.deco {
  position: absolute; bottom: -160px; right: -100px;
  width: 480px; height: 480px;
  border-radius: 50%;
  border: 2px solid rgba(127,175,58,0.15);
}
.deco2 {
  position: absolute; bottom: -80px; right: -20px;
  width: 300px; height: 300px;
  border-radius: 50%;
  border: 2px solid rgba(127,175,58,0.1);
}

.eyebrow {
  font: 600 22px/1 var(--font);
  letter-spacing: 2px;
  color: #A8CF6F;
  margin-bottom: 28px;
}

h2 {
  font: 800 72px/1.15 var(--font);
  color: var(--light);
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.subtitle {
  font: 400 28px/1.6 var(--font);
  color: rgba(255,255,255,0.55);
  margin-bottom: 64px;
  max-width: 800px;
}

.feature-box {
  background: rgba(127,175,58,0.1);
  border: 1px solid rgba(127,175,58,0.25);
  border-radius: 24px;
  padding: 48px 52px;
  margin-bottom: 32px;
}

.feature-badge {
  display: inline-block;
  padding: 8px 18px;
  background: rgba(127,175,58,0.2);
  border-radius: 999px;
  font: 600 20px/1 var(--font);
  color: #A8CF6F;
  margin-bottom: 28px;
}

.feature-title {
  font: 700 36px/1.4 var(--font);
  color: var(--light);
  margin-bottom: 20px;
}

.feature-desc {
  font: 400 27px/1.7 var(--font);
  color: rgba(255,255,255,0.65);
}

.feature-desc strong { color: #A8CF6F; font-weight: 700; }

.note {
  font: 400 24px/1.6 var(--font);
  color: rgba(255,255,255,0.4);
  padding-top: 8px;
}

.handle { position: absolute; bottom: 52px; left: 88px; font: 400 22px/1 var(--font); color: rgba(255,255,255,0.25); }
.page-num { position: absolute; bottom: 52px; right: 88px; font: 500 22px/1 var(--font); letter-spacing: 3px; color: rgba(255,255,255,0.18); }
</style>
</head>
<body>
<div class="card">
  <div class="accent-line"></div>
  <div class="deco"></div>
  <div class="deco2"></div>

  <p class="eyebrow">WEB APP</p>

  <h2>발화분석 연습 앱,<br>직접 만들었어요</h2>

  <p class="subtitle">연습할 예문이 매번 고정이면 답 외워버리니까요.</p>

  <div class="feature-box">
    <span class="feature-badge">무료 공개</span>
    <p class="feature-title">P-FA Ⅱ 말더듬 전사문 생성기</p>
    <p class="feature-desc">
      연령·심도·비유창성 유형을 설정하면<br>
      <strong>연습용 발화가 자동으로 생성</strong>됩니다.<br>
      풀 때마다 새 문제가 나와요.
    </p>
  </div>

  <p class="note">스터디 참여자들에게 링크 공유 완료 ✓</p>

  <span class="handle">@slp_irudassam</span>
  <span class="page-num">04 / 07</span>
</div>
</body>
</html>
