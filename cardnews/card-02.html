<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F8F8F4; --tint: #EFF1E8; --primary: #4B5E2A; --dark-bg: #2B371A;
  --text: #1A1A18; --sub: #5A5A54; --light: #FFFFFF;
  --border: #DDE0D0; --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}
body { width: 1080px; height: 1350px; overflow: hidden; background: var(--bg); }
.card { width: 1080px; height: 1350px; padding: 96px 88px; display: flex; flex-direction: column; justify-content: center; position: relative; }
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #7FAF3A, #4B5E2A); }

.eyebrow {
  font: 600 22px/1 var(--font);
  letter-spacing: 2px;
  color: var(--primary);
  margin-bottom: 28px;
}

h2 {
  font: 800 72px/1.15 var(--font);
  color: var(--text);
  letter-spacing: -1px;
  margin-bottom: 56px;
}

.divider { width: 56px; height: 3px; background: var(--primary); margin-bottom: 56px; }

.body-text {
  font: 400 32px/1.8 var(--font);
  color: var(--sub);
  max-width: 860px;
}

.body-text strong {
  color: var(--text);
  font-weight: 700;
}

.highlight-box {
  margin-top: 64px;
  padding: 40px 44px;
  background: var(--tint);
  border-left: 4px solid var(--primary);
  border-radius: 0 16px 16px 0;
}

.highlight-box p {
  font: 500 30px/1.7 var(--font);
  color: var(--text);
}

.handle { position: absolute; bottom: 52px; left: 88px; font: 400 22px/1 var(--font); letter-spacing: 0.5px; color: var(--border); }
.page-num { position: absolute; bottom: 52px; right: 88px; font: 500 22px/1 var(--font); letter-spacing: 3px; color: var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>

  <p class="eyebrow">RETROSPECTIVE</p>

  <h2>어떤 스터디였나요?</h2>

  <div class="divider"></div>

  <p class="body-text">
    1급 국가고시를 준비하는 선생님,<br>
    이미 현장에서 P-FA를 쓰고 계신 선생님,<br>
    함께 모인 스터디였어요.<br><br>
    기초 개념보다는<br>
    <strong>"실제로 채점할 때 막히는 지점"</strong>에<br>
    집중해서 진행했습니다.
  </p>

  <div class="highlight-box">
    <p>함정 유형 구분, 점수 계산, AI 보고서까지<br>— 다 손으로 직접 해봤어요.</p>
  </div>

  <span class="handle">@slp_irudassam</span>
  <span class="page-num">02 / 07</span>
</div>
</body>
</html>
