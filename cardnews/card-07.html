<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F8F8F4; --tint: #EFF1E8; --primary: #4B5E2A; --dark-bg: #2B371A;
  --text: #1A1A18; --sub: #5A5A54; --light: #FFFFFF;
  --border: #DDE0D0; --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}
body { width: 1080px; height: 1350px; overflow: hidden; background: var(--bg); }
.card { width: 1080px; height: 1350px; padding: 96px 88px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; text-align: center; }
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #7FAF3A, #4B5E2A); }

.logo-area {
  width: 100px; height: 100px;
  background: var(--tint);
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
  margin-bottom: 52px;
}

h2 {
  font: 800 68px/1.2 var(--font);
  color: var(--text);
  letter-spacing: -1px;
  margin-bottom: 40px;
}

.divider {
  width: 56px; height: 3px;
  background: var(--primary);
  margin: 0 auto 40px;
}

.body-text {
  font: 400 30px/1.85 var(--font);
  color: var(--sub);
  max-width: 820px;
  margin-bottom: 64px;
}
.body-text strong { color: var(--text); font-weight: 700; }

.follow-row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 24px 44px;
  background: var(--tint);
  border-radius: 999px;
  margin-bottom: 0;
}
.follow-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--primary);
}
.follow-text {
  font: 600 26px/1 var(--font);
  color: var(--primary);
}

.handle { position: absolute; bottom: 52px; left: 88px; font: 400 22px/1 var(--font); letter-spacing: 0.5px; color: var(--border); }
.page-num { position: absolute; bottom: 52px; right: 88px; font: 500 22px/1 var(--font); letter-spacing: 3px; color: var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>

  <h2>함께 성장해요</h2>
  <div class="divider"></div>

  <p class="body-text">
    스터디에 와주신 선생님들,<br>
    정말 감사합니다.<br><br>
    앞으로도 <strong>평가도구·AI 활용·임상 기록</strong>에 관한<br>
    유용한 내용들을 꾸준히 나눌게요.<br><br>
    저장해두시면 나중에 또 찾아볼 수 있어요.
  </p>

  <div class="follow-row">
    <div class="follow-dot"></div>
    <span class="follow-text">@slp_irudassam 팔로우하기</span>
    <div class="follow-dot"></div>
  </div>

  <span class="handle">@slp_irudassam</span>
  <span class="page-num">07 / 07</span>
</div>
</body>
</html>
